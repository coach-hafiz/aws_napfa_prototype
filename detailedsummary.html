<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Run Feedback — Detailed Summary</title>

<style>
body{margin:0;font-family:system-ui;background:#f6f7f9}
.card{background:#fff;border-radius:12px;padding:12px;margin:12px}
.sectionTitle{font-weight:800;margin:12px 0}
.tableWrap{max-height:300px;overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:center}
tr:hover{background:#eef;cursor:pointer}
.selected{outline:2px solid #015871;background:#dff}
.graphBox{overflow:auto}
</style>
</head>

<body>

<div class="card">

<div class="sectionTitle">Overview</div>
<div id="overview"></div>

<div class="sectionTitle">Leaderboard</div>
<div class="tableWrap">
<table>
<thead>
<tr><th>Pos</th><th>Runner</th><th>Time</th><th>Band</th></tr>
</thead>
<tbody id="leaderBodyClass"></tbody>
</table>
</div>

<div class="sectionTitle">Selected Lap Trend</div>
<div class="graphBox">
<svg id="selectedGraph" width="600" height="200"></svg>
</div>

<div class="sectionTitle">All Runners' Split Times</div>
<div class="graphBox">
<svg id="allGraph" width="600" height="250"></svg>
</div>

<div class="sectionTitle">Feedback</div>
<div id="feedback"></div>

<div class="sectionTitle">Questions to Check Understanding</div>
<div id="questions"></div>

<div class="sectionTitle">Key Takeaway</div>
<div id="takeaway"></div>

</div>


<div class="card" id="studentSection">

<div class="sectionTitle">Selected Student</div>
<div id="studentInfo"></div>

<div class="sectionTitle">Leaderboard</div>
<div class="tableWrap">
<table>
<thead>
<tr><th>Pos</th><th>Runner</th><th>Time</th><th>Band</th></tr>
</thead>
<tbody id="leaderBodyStudent"></tbody>
</table>
</div>

<div class="sectionTitle">Student Reflection Questions</div>
<div id="reflection"></div>

</div>

<script>

var data = JSON.parse(localStorage.getItem('topcodesLapSummaryV1') || '{}');

if(!data.runners){
  document.body.innerHTML="No data";
}

function msToMMSS(ms){
  var s=Math.floor(ms/1000);
  var m=Math.floor(s/60);
  var ss=s%60;
  return m+":"+("0"+ss).slice(-2);
}

function perLap(splits){
  var out=[];
  for(var i=0;i<splits.length;i++){
    var prev=i===0?0:splits[i-1];
    out.push((splits[i]-prev)/1000);
  }
  return out;
}

function sd(a){
  var m=a.reduce((x,y)=>x+y)/a.length;
  return Math.sqrt(a.reduce((x,y)=>x+(y-m)*(y-m),0)/a.length);
}

function band(r){
  if(!r.finished)return'DNF';
  var v=sd(r.per);
  if(v<3)return'A';
  if(v<6)return'B';
  if(v<10)return'C';
  return'D';
}

var runners=data.runners.map(r=>{
  var per=perLap(r.splitsMs);
  return{
    id:r.id,
    splits:r.splitsMs,
    per:per,
    finished:r.finished,
    finish:r.splitsMs.slice(-1)[0]||0,
    band:band({finished:r.finished,per:per})
  };
});

runners.sort((a,b)=>a.finish-b.finish);

function renderLeaderboard(targetId){
  var el=document.getElementById(targetId);
  el.innerHTML="";
  var pos=1;

  runners.forEach(r=>{
    var tr=document.createElement('tr');
    tr.innerHTML=
      "<td>"+(r.finished?pos:"-")+"</td>"+
      "<td>"+r.id+"</td>"+
      "<td>"+(r.finished?msToMMSS(r.finish):"DNF")+"</td>"+
      "<td>"+r.band+"</td>";

    tr.onclick=function(){
      selectStudent(r.id);
    };

    el.appendChild(tr);
    if(r.finished)pos++;
  });
}

renderLeaderboard("leaderBodyClass");
renderLeaderboard("leaderBodyStudent");

function drawGraph(svg, runners, highlight){
  svg.innerHTML="";
  var w=600,h=200;
  var max=0;

  runners.forEach(r=>{
    r.per.forEach(x=>{if(x>max)max=x;});
  });

  runners.forEach(r=>{
    var path="";
    r.per.forEach((sec,i)=>{
      var x=i*(w/(r.per.length-1));
      var y=h-(sec/max*h);
      path+= (i===0?"M":"L")+x+","+y;
    });

    var p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",path);
    p.setAttribute("stroke", r.id===highlight?"red":"#999");
    p.setAttribute("fill","none");
    p.setAttribute("stroke-width", r.id===highlight?3:1);

    svg.appendChild(p);
  });
}

function selectStudent(id){

  var r=runners.find(x=>x.id==id);

  document.querySelectorAll("tr").forEach(tr=>tr.classList.remove("selected"));
  event?.currentTarget?.classList.add("selected");

  document.getElementById("studentInfo").innerHTML=
    "Runner "+id+" | Finish: "+msToMMSS(r.finish)+" | Band "+r.band;

  drawGraph(document.getElementById("selectedGraph"),[r],id);
  drawGraph(document.getElementById("allGraph"),runners,id);

  document.getElementById("studentSection").scrollIntoView({behavior:"smooth"});
}

drawGraph(document.getElementById("allGraph"),runners,null);

</script>

</body>
</html>
